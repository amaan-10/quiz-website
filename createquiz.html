<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="main">
        <header class="header">
            <a href="index.html" class="logo">Quiz.</a>
            <nav class="navbar">
                <a href="#">Home</a>
                <a href="#">About</a>
                <a href="#">Contact</a>
                <a href="#">Logout</a>
            </nav>
        </header>
        <section class="home">
            <div class="home-container">
                
                <form id="quizForm">
                    <div id="quizForm1" class="quizForm">
                        <h1>Create Quiz</h1>
                        <label for="quizTitle">Quiz Title:</label>
                        <input type="text" class="quizTitle" id="quizTitle" required>
                
                        <label for="numQuestions">Number of Questions:</label>
                        <input type="number" class="numQuestions" id="numQuestions" min="1" required>
                        <button class="gnrt-btn" id="gnrt-btn" type="button" onclick="generateQuiz()">Start Quiz</button> 
                    </div>
                    <div class="questionsContainer" id="questionsContainer"></div>
            
                    <div class="buttons">                   
                        <button class="next-btn" id="next-btn" type="button" style="display: none;" onclick="nextQuestion()">Next</button>
                        <button class="save-btn" id="save-btn" type="button" style="display: none;" onclick="saveQuiz()">Save Quiz</button>
                    </div>
                </form>
            </div>
        </section>
    </main>
    <script src="/createquiz.js"></script>

</body>
</html>
