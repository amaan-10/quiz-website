<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            background-color: bisque;
            color: white;
        }

        form {
            margin-top: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
        }

        button {
            padding: 10px 15px;
            background-color: transparent;
            color: white;
            border: 2px white;
            border-radius: 4px white;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background-color: transparent;
        }
    </style>
</head>
<body>

    <h2>Quiz</h2>

    <!-- Select quiz title -->
    <label for="quizTitle">Select Quiz Title:</label>
    <select id="quizTitle"></select>
    <button type="button" onclick="loadQuiz()">Load Quiz</button>

    <div id="quizContainer"></div>

    <button type="button" id="nextButton" style="display: none;" onclick="nextQuestion()">Next Question</button>
    <button type="button" id="submitButton" style="display: none;" onclick="submitQuiz()">Submit Quiz</button>

    <div id="scoreContainer" style="display: none;"></div>

    <script>
        let currentQuestionIndex = 0;
        let userResponses = [];
        let quizData;

        const quizTitleSelect = document.getElementById("quizTitle");
        const quizContainer = document.getElementById("quizContainer");
        const nextButton = document.getElementById("nextButton");
        const submitButton = document.getElementById("submitButton");
        const scoreContainer = document.getElementById("scoreContainer");

        // Load quiz titles from localStorage
        const quizTitles = Object.keys(localStorage).filter(title => isValidQuizData(localStorage.getItem(title)));
        quizTitles.forEach(title => {
            const option = document.createElement("option");
            option.value = title;
            option.textContent = title;
            quizTitleSelect.appendChild(option);
        });

        function isValidQuizData(data) {
            try {
                const parsedData = JSON.parse(data);
                return parsedData && parsedData.title && Array.isArray(parsedData.questions);
            } catch (error) {
                return false;
            }
        }

        function loadQuiz() {
            const selectedTitle = quizTitleSelect.value;

            // Check if the selected title exists in localStorage
            if (!localStorage.getItem(selectedTitle)) {
                alert("Selected quiz title does not exist.");
                return;
            }

            // Reset variables for a new quiz
            currentQuestionIndex = 0;
            userResponses = [];

            // Retrieve quiz data from localStorage based on the selected title
            const jsonData = localStorage.getItem(selectedTitle);
            quizData = JSON.parse(jsonData);

            // Display quiz questions
            showQuestion(currentQuestionIndex);
        }

        function showQuestion(index) {
            quizContainer.innerHTML = `<h3>${quizData.title}</h3>
                <p>${quizData.questions[index].text}</p>
                <div id="choicesContainer">${getChoicesHTML(index)}</div>`;

            // Show/hide navigation buttons
            if (index < quizData.questions.length - 1) {
                nextButton.style.display = "block";
                submitButton.style.display = "none";
            } else {
                nextButton.style.display = "none";
                submitButton.style.display = "block";
            }
        }

        function getChoicesHTML(index) {
            return quizData.questions[index].choices.map(choice =>
                `<p><button type="button" onclick="selectChoice('${choice}')">${choice}</button></p>`
            ).join("");
        }

        function selectChoice(choice) {
            userResponses[currentQuestionIndex] = choice;
            currentQuestionIndex++;
            if (currentQuestionIndex < quizData.questions.length) {
                showQuestion(currentQuestionIndex);
            } else {
                submitQuiz();
            }
        }

        function submitQuiz() {
            // Evaluate answers and display results (replace with your own logic)
            const score = calculateScore();
            displayScore(score);
        }

        function calculateScore() {
            let score = 0;
            for (let i = 0; i < quizData.questions.length; i++) {
                if (userResponses[i] === quizData.questions[i].correctAnswer) {
                    score++;
                }
            }
            return score;
        }

        function displayScore(score) {
            scoreContainer.innerHTML = `<h3>Quiz Score</h3>
                <p>Your score: ${score} out of ${quizData.questions.length}</p>`;
            scoreContainer.style.display = "block";

            // Hide navigation buttons
            nextButton.style.display = "none";
            submitButton.style.display = "none";
        }
    </script>

</body>
</html>
