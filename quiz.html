<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="main">
        <header class="header">
            <a href="index.html" class="logo">Quiz.</a>
            <nav class="navbar">
                <a href="#">Home</a>
                <a href="#">About</a>
                <a href="#">Contact</a>
                <a href="#">Logout</a>
            </nav>
        </header>
        <section class="home">
            <div class="home-container">
                <div class="quiz1">
                    <h1>Quiz</h1>

                    <!-- Select quiz title -->
                    <label for="quizTitle">Select Quiz Title:</label>
                    <select id="quizTitle"></select>
                    <button type="button" class="load-btn" id="loadButton" onclick="loadQuiz()">Load Quiz</button>
                </div>
                <div class="quizContainer" id="quizContainer"></div>

                <button type="button" class="next-btn" id="nextButton" style="display: none;" onclick="nextQuestion()">Next Question</button>
                <button type="button" class="submit-btn" id="submitButton" style="display: none;" onclick="submitQuiz()">Submit Quiz</button>

                <div class="scoreContainer" id="scoreContainer" style="display: none;">
                    
                </div>
            </div>
        </section>
    </main>
    <script src="/quiz.js"></script>

</body>
</html>
